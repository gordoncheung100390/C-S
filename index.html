<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&amp;S Quality Cleaning Services</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #C9A95A;
    --gold-light: #E2C97A;
    --bg:         #0C0B09;
    --text:       #F0EAE0;
    --muted:      #9A8A72;
    --rule:       rgba(201, 169, 90, 0.25);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── NAV ─────────────────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 52px;
    transition: background 0.4s, backdrop-filter 0.4s, padding 0.3s;
  }
  nav.scrolled {
    background: rgba(12, 11, 9, 0.90);
    backdrop-filter: blur(14px);
    padding: 16px 52px;
    border-bottom: 1px solid var(--rule);
  }

  .nav-logo {
    height: 112px;
    width: auto;
  }

  .nav-contact {
    text-decoration: none;
    color: rgba(240,234,224,0.65);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 400;
    transition: color 0.2s;
  }
  .nav-contact:hover { color: var(--gold); }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 620px;
    display: flex;
    align-items: flex-end;
    padding-bottom: 110px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('hero.png');
    background-size: cover;
    background-position: center 30%;
    transform: scale(1.04);
    animation: heroZoom 14s ease forwards;
  }

  /* Heavy overlay — fully buries the original image text */
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(12,11,9,0.45) 0%,
      rgba(12,11,9,0.50) 40%,
      rgba(12,11,9,0.88) 100%
    );
  }

  @keyframes heroZoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.0); }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 52px;
    max-width: 780px;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease forwards;
  }

  .hero-headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(44px, 6vw, 84px);
    line-height: 1.06;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1s 0.65s ease forwards;
  }

  .hero-headline em {
    font-style: italic;
    color: var(--gold-light);
  }

  .hero-sub {
    font-size: 15px;
    color: rgba(240, 234, 224, 0.70);
    line-height: 1.75;
    max-width: 460px;
    margin-bottom: 40px;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 1s 0.85s ease forwards;
  }

  .hero-cta {
    opacity: 0;
    animation: fadeUp 1s 1.05s ease forwards;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 16px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    font-weight: 500;
    transition: background 0.25s;
  }
  .btn-primary:hover { background: var(--gold-light); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ──────────────────────────────────────── */
  footer {
    background: #080705;
    border-top: 1px solid var(--rule);
    padding: 40px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }

  .footer-logo { height: 48px; opacity: 0.85; }

  .footer-copy {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    opacity: 0.6;
  }

  /* ── TABLET (max 1024px) ─────────────────────────── */
  @media (max-width: 1024px) {
    nav { padding: 24px 36px; }
    nav.scrolled { padding: 16px 36px; }

    .nav-logo { 
      height: 145px; /* Significantly upscaled since it's a vertical stacked logo */
    } 

    .nav-contact {
      font-size: 15px;
      font-weight: 500;
    }

    .hero {
      align-items: center;
      padding-top: 220px; /* More clearance for the larger logo */
      padding-bottom: 80px;
    }

    .hero-content {
      padding: 0 36px;
      max-width: 700px;
    }

    .hero-eyebrow {
      font-size: 15px; 
      font-weight: 500;
      letter-spacing: 0.24em;
    }

    .hero-headline {
      font-size: clamp(46px, 6.5vw, 72px); 
    }

    .hero-sub {
      font-size: 20px; /* Large, premium readable body text */
      font-weight: 400;
      color: rgba(240, 234, 224, 0.90);
      max-width: 540px;
      line-height: 1.65;
    }

    .btn-primary {
      font-size: 14px;
      padding: 20px 48px;
      font-weight: 700;
    }

    footer {
      padding: 36px;
    }

    .footer-logo { height: 54px; }
  }

  /* ── MOBILE (max 640px) ──────────────────────────── */
  @media (max-width: 640px) {
    nav {
      padding: 24px 24px;
      align-items: center;
    }
    nav.scrolled {
      padding: 16px 24px;
    }

    .nav-logo { 
      height: 120px; /* Noticeably upscaled to keep branding visible */
    } 

    .nav-contact {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
    }

    .hero {
      min-height: 100svh;
      align-items: center;
      padding-top: 200px; 
      padding-bottom: 80px;
    }

    .hero-overlay {
      background: linear-gradient(
        to bottom,
        rgba(12,11,9,0.60) 0%,
        rgba(12,11,9,0.70) 40%,
        rgba(12,11,9,0.95) 100% 
      );
    }

    .hero-content {
      padding: 0 24px;
    }

    .hero-eyebrow {
      font-size: 14px; 
      font-weight: 500;
      letter-spacing: 0.22em;
      margin-bottom: 18px;
    }

    .hero-headline {
      font-size: clamp(42px, 11vw, 60px); 
      line-height: 1.12;
      margin-bottom: 24px;
    }

    .hero-sub {
      font-size: 18px; /* Considerably boosted text height */
      font-weight: 400; /* Made slightly heavier for high contrast scan-readability */
      color: #F0EAE0; 
      line-height: 1.65;
      margin-bottom: 38px;
    }

    .btn-primary {
      padding: 18px 36px;
      font-size: 13px;
      font-weight: 700; /* Thickened button text */
      width: 100%;
      text-align: center;
      letter-spacing: 0.16em;
    }

    footer {
      padding: 36px 24px;
      gap: 16px;
    }

    .footer-logo { height: 50px; }
    .footer-copy { font-size: 12px; }
  }

  /* ── VERY SMALL (max 380px) ──────────────────────── */
  @media (max-width: 380px) {
    .nav-logo { height: 105px; }
    .nav-contact { font-size: 13px; }
    
    .hero-headline {
      font-size: 38px; 
    }
    .hero-sub {
      font-size: 17px;
    }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <img src="logo.png" alt="C&S Quality Cleaning Services" class="nav-logo">
  <a href="mailto:csqualitycleaningservices@gmail.com" class="nav-contact">Contact Us</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">C&amp;S Quality Cleaning Services</p>
    <h1 class="hero-headline">
      Immaculate spaces,<br>
      delivered with <em>quality.</em>
    </h1>
    <p class="hero-sub">
      Premium residential and commercial cleaning for clients who expect — and deserve — the very finest. Serving Norfolk.
    </p>
    <div class="hero-cta">
      <a href="mailto:csqualitycleaningservices@gmail.com" class="btn-primary">Request a Consultation</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <img src="logo.png" alt="C&S" class="footer-logo">
  <p class="footer-copy">© 2025 C&amp;S Quality Cleaning Services. All rights reserved.</p>
</footer>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  });
</script>
</body>
</html>
